<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design by Cloé — Plateforme de pilotage</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --coral: #f76c5e;
    --coral-dark: #e85a4c;
    --dark-blue: #2321bc;
    --dark-blue-deep: #1a1988;
    --blue: #6296f7;
    --light-blue: #afc1ed;
    --pastel: #f0f2f9;
    --white: #ffffff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --border: #e5e7eb;
  }

  body {
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg, #f0f2f9 0%, #e8ecf5 100%);
    color: var(--text);
    min-height: 100vh;
  }

  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 100vh;
  }

  /* ========== SIDEBAR ========== */
  .sidebar {
    background: linear-gradient(180deg, var(--dark-blue) 0%, var(--dark-blue-deep) 100%);
    color: white;
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .brand {
    display: flex;
    gap: 14px;
    align-items: center;
    padding-bottom: 32px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 24px;
  }
  .brand-logo {
    width: 48px; height: 48px;
    background: var(--coral);
    border-radius: 12px;
    display: grid; place-items: center;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -1px;
  }
  .brand-logo span { color: var(--light-blue); }
  .brand-text strong { display: block; font-size: 15px; font-weight: 700; }
  .brand-text small { font-size: 11px; opacity: 0.6; letter-spacing: 0.5px; text-transform: uppercase; }

  .nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.7);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
  }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: white; }
  .nav-item.active {
    background: rgba(247, 108, 94, 0.15);
    color: white;
    font-weight: 600;
    box-shadow: inset 3px 0 0 var(--coral);
  }
  .nav-item svg { width: 18px; height: 18px; }

  .sidebar-footer {
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .footer-tag {
    font-size: 11px;
    opacity: 0.5;
    text-align: center;
    letter-spacing: 0.5px;
  }

  /* ========== MAIN ========== */
  .main { padding: 40px 48px; overflow-y: auto; }
  .view { display: flex; flex-direction: column; gap: 24px; max-width: 1400px; }
  .view-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 16px;
    flex-wrap: wrap;
  }
  .view-title {
    font-size: 34px;
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--dark-blue);
  }
  .view-subtitle { color: var(--muted); font-size: 14px; margin-top: 4px; }

  /* ========== CARD ========== */
  .card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 1px 3px rgba(35, 33, 188, 0.04), 0 4px 20px rgba(35, 33, 188, 0.04);
    border: 1px solid rgba(35, 33, 188, 0.05);
  }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--dark-blue);
    margin-bottom: 18px;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* ========== BUTTONS ========== */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    font-family: inherit;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
  }
  .btn-primary {
    background: var(--coral);
    color: white;
    box-shadow: 0 4px 14px rgba(247, 108, 94, 0.3);
  }
  .btn-primary:hover {
    background: var(--coral-dark);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(247, 108, 94, 0.4);
  }
  .btn-ghost { background: transparent; color: var(--muted); }
  .btn-ghost:hover { background: var(--pastel); color: var(--dark-blue); }
  .btn-secondary {
    background: white;
    color: var(--dark-blue);
    border: 1.5px solid var(--dark-blue);
  }
  .btn-secondary:hover { background: var(--dark-blue); color: white; }

  .icon-btn {
    background: transparent;
    border: none;
    padding: 6px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--muted);
    display: grid;
    place-items: center;
    transition: all 0.2s;
  }
  .icon-btn svg { width: 16px; height: 16px; }
  .icon-btn:hover { background: var(--pastel); color: var(--dark-blue); }
  .icon-btn-danger:hover { background: #fee2e2; color: var(--danger); }

  /* ========== KPI ========== */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
  }
  .kpi { position: relative; overflow: hidden; }
  .kpi-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: grid; place-items: center;
    margin-bottom: 14px;
  }
  .kpi-icon svg { width: 22px; height: 22px; }
  .kpi-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .kpi-value {
    font-size: 28px;
    font-weight: 800;
    margin-top: 6px;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .kpi-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 500;
  }
  .kpi-sub.up { color: var(--success); }
  .kpi-sub.down { color: var(--danger); }
  .kpi-coral .kpi-icon { background: #fce5e2; color: var(--coral); }
  .kpi-warning .kpi-icon { background: #fef3c7; color: var(--warning); }
  .kpi-blue .kpi-icon { background: #dbeafe; color: var(--blue); }
  .kpi-dark .kpi-icon { background: #e0e7ff; color: var(--dark-blue); }
  .kpi-success .kpi-icon { background: #d1fae5; color: var(--success); }
  .kpi-danger .kpi-icon { background: #fee2e2; color: var(--danger); }

  /* ========== GRIDS ========== */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-2-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 900px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
  }

  .mini-stat {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 14px;
  }
  .mini-stat strong { font-size: 20px; color: var(--dark-blue); }
  .mini-stat svg { width: 20px; height: 20px; }

  /* ========== CLIENT CARDS ========== */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .client-card { display: flex; gap: 16px; position: relative; }
  .client-avatar {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--coral), #f59481);
    color: white;
    border-radius: 12px;
    display: grid; place-items: center;
    font-weight: 800;
    font-size: 22px;
    flex-shrink: 0;
  }
  .client-info { flex: 1; min-width: 0; }
  .client-info h4 { font-size: 16px; font-weight: 700; }
  .client-company { font-size: 13px; color: var(--dark-blue); font-weight: 600; margin-top: 2px; }
  .client-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .card-actions { display: flex; gap: 4px; flex-shrink: 0; }

  /* ========== FILTERS ========== */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: white;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip:hover { border-color: var(--dark-blue); color: var(--dark-blue); }
  .chip.active {
    background: var(--dark-blue);
    color: white;
    border-color: var(--dark-blue);
  }

  /* ========== CONTRACTS ========== */
  .contracts-list { display: flex; flex-direction: column; gap: 12px; }
  .contract-card {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
  }
  .contract-main { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .contract-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
  .contract-header h4 { font-size: 16px; font-weight: 700; }
  .contract-client { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .contract-amount { font-size: 20px; font-weight: 800; color: var(--dark-blue); white-space: nowrap; }
  .contract-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .contract-timeline {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
  }

  /* ========== BADGE ========== */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2px;
  }

  /* ========== EMPTY ========== */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 60px 24px;
    text-align: center;
  }
  .empty-state p { color: var(--muted); font-size: 14px; }
  .empty-state svg { width: 40px; height: 40px; color: var(--light-blue); }
  .empty { text-align: center; color: #9ca3af; padding: 30px 10px; font-size: 13px; }

  /* ========== TABLE ========== */
  .table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .table th {
    text-align: left;
    padding: 10px 12px;
    font-weight: 600;
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  .table td {
    padding: 12px;
    border-bottom: 1px solid #f3f4f6;
    vertical-align: middle;
  }
  .table tr:hover td { background: #f9fafb; }
  .row-actions { display: flex; gap: 4px; justify-content: flex-end; }
  .amount-in { color: var(--success); font-weight: 700; }
  .amount-out { color: var(--danger); font-weight: 700; }

  /* ========== MINI LIST ========== */
  .mini-list { display: flex; flex-direction: column; gap: 8px; }
  .mini-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    background: #f9fafb;
    border-radius: 8px;
    font-size: 13px;
  }

  /* ========== KANBAN ========== */
  .kanban {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  @media (max-width: 900px) { .kanban { grid-template-columns: 1fr; } }
  .kanban-col {
    background: var(--pastel);
    border-radius: 14px;
    min-height: 200px;
    overflow: hidden;
  }
  .kanban-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: white;
    padding: 16px 14px 12px;
    border-top: 3px solid;
  }
  .kanban-header > div { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .kanban-header svg { width: 18px; height: 18px; }
  .kanban-count {
    background: var(--pastel);
    color: var(--muted);
    padding: 2px 9px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 700;
  }
  .kanban-items {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 14px;
  }
  .kanban-empty {
    text-align: center;
    color: #9ca3af;
    padding: 30px 10px;
    font-size: 12px;
    font-style: italic;
  }

  .project-card { padding: 16px; }
  .project-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 8px;
  }
  .project-header h4 { font-size: 14px; font-weight: 700; line-height: 1.3; }
  .project-client { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .project-deadline {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--warning);
    margin-top: 10px;
    font-weight: 600;
  }
  .project-deadline svg { width: 13px; height: 13px; }
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    font-size: 11px;
    font-weight: 700;
    color: var(--dark-blue);
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--pastel);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--dark-blue));
    border-radius: 4px;
    transition: width 0.3s;
  }

  /* ========== MONTH SELECTOR ========== */
  .month-selector {
    display: flex;
    align-items: center;
    gap: 12px;
    background: white;
    border-radius: 14px;
    padding: 12px 18px;
    box-shadow: 0 1px 3px rgba(35, 33, 188, 0.04), 0 4px 20px rgba(35, 33, 188, 0.04);
    border: 1px solid rgba(35, 33, 188, 0.05);
  }
  .month-nav-btn {
    background: var(--pastel);
    border: none;
    width: 36px; height: 36px;
    border-radius: 10px;
    cursor: pointer;
    display: grid;
    place-items: center;
    color: var(--dark-blue);
    transition: all 0.2s;
  }
  .month-nav-btn:hover { background: var(--dark-blue); color: white; }
  .month-nav-btn svg { width: 18px; height: 18px; }
  .month-label {
    flex: 1;
    text-align: center;
    font-size: 18px;
    font-weight: 800;
    color: var(--dark-blue);
    letter-spacing: -0.3px;
    text-transform: capitalize;
  }
  .month-today {
    font-size: 10px;
    background: var(--coral);
    color: white;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  /* ========== BILAN BANNER ========== */
  .bilan-banner {
    background: linear-gradient(135deg, var(--dark-blue) 0%, var(--dark-blue-deep) 100%);
    color: white;
    border-radius: 20px;
    padding: 32px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 24px;
    position: relative;
    overflow: hidden;
  }
  .bilan-banner::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 240px; height: 240px;
    background: radial-gradient(circle, rgba(247,108,94,0.25), transparent 70%);
    pointer-events: none;
  }
  .bilan-item {
    position: relative;
    z-index: 1;
  }
  .bilan-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    opacity: 0.7;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .bilan-value {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
  }
  .bilan-item.in .bilan-value { color: #a7f3d0; }
  .bilan-item.out .bilan-value { color: #fecaca; }
  .bilan-item.net .bilan-value { color: white; }
  .bilan-sub {
    font-size: 12px;
    opacity: 0.6;
    margin-top: 4px;
    font-weight: 500;
  }
  @media (max-width: 700px) {
    .bilan-banner { grid-template-columns: 1fr; gap: 16px; padding: 24px; }
    .bilan-value { font-size: 26px; }
  }

  /* ========== MODAL ========== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(35, 33, 188, 0.15);
    backdrop-filter: blur(6px);
    display: none;
    place-items: center;
    z-index: 100;
    padding: 20px;
    animation: fadeIn 0.2s;
  }
  .modal-overlay.open { display: grid; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: white;
    border-radius: 20px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(35, 33, 188, 0.2);
    animation: slideUp 0.3s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 28px;
    border-bottom: 1px solid var(--pastel);
  }
  .modal-header h3 {
    font-size: 18px;
    font-weight: 700;
    color: var(--dark-blue);
  }
  .modal-close {
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    color: var(--muted);
  }
  .modal-close:hover { background: var(--pastel); color: var(--dark-blue); }
  .modal-body {
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    padding-top: 18px;
    border-top: 1px solid var(--pastel);
    margin-top: 8px;
  }

  /* ========== FIELDS ========== */
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field-input {
    padding: 10px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    font-family: inherit;
    font-size: 14px;
    background: white;
    color: var(--text);
    transition: all 0.2s;
    width: 100%;
  }
  .field-input:focus {
    outline: none;
    border-color: var(--dark-blue);
    box-shadow: 0 0 0 3px rgba(35, 33, 188, 0.08);
  }
  textarea.field-input { resize: vertical; min-height: 70px; }

  .chart-wrap {
    position: relative;
    height: 260px;
  }

  /* ========== PROSPECTION ========== */
  .prospect-kpis {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }
  .prospect-kpi {
    padding: 16px 18px;
    border-left: 4px solid;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .prospect-kpi-count {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .prospect-kpi-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    font-weight: 600;
  }
  .prospect-kpi-amount {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }

  .prospect-table-wrap {
    overflow-x: auto;
    margin: 0 -4px;
    padding: 0 4px;
  }
  .prospect-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 1100px;
  }
  .prospect-table th {
    text-align: left;
    padding: 12px 10px;
    font-weight: 700;
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    border-bottom: 2px solid var(--border);
    background: #fafbfc;
    position: sticky;
    top: 0;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .prospect-table th:hover { background: #f0f2f9; color: var(--dark-blue); }
  .prospect-table th.sort-active { color: var(--dark-blue); background: #e0e7ff; }
  .prospect-table td {
    padding: 14px 10px;
    border-bottom: 1px solid #f3f4f6;
    vertical-align: middle;
  }
  .prospect-table tr:hover td { background: #fafbfc; }
  .prospect-company { font-weight: 700; color: var(--text); }
  .prospect-sector { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .prospect-contact { font-weight: 600; }
  .prospect-contact-role { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .prospect-coords {
    display: flex;
    flex-direction: column;

}
function save(key, value) {

// ============================================================

const fmtEur = n => new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(n || 0);
const fmtDate = d => d ? new Date(d).toLocaleDateString('fr-FR') : '—';
const todayISO = () => new Date().toISOString().split('T')[0];
const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = () => Date.now().toString() + Math.random().toString(36).slice(2, 6);

const MONTHS_FR = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
function monthLabel(ym) {
  const [y, m] = ym.split('-').map(Number);
  return `${MONTHS_FR[m-1]} ${y}`;
}
function prevMonth(ym) {
  const [y, m] = ym.split('-').map(Number);
  const d = new Date(y, m - 2, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function nextMonth(ym) {
  const [y, m] = ym.split('-').map(Number);
  const d = new Date(y, m, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

// ============================================================
// MODAL
// ============================================================
let modalSubmitHandler = null;

function openModal(title, bodyHtml, onSubmit) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modal').classList.add('open');
  modalSubmitHandler = onSubmit;
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  modalSubmitHandler = null;
}
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') closeModal();
});

function submitModal() {
  if (modalSubmitHandler) modalSubmitHandler();
}

function renderNav() {
  document.getElementById('nav').innerHTML = NAV.map(n => `
    <button class="nav-item ${state.view === n.id ? 'active' : ''}" onclick="setView('${n.id}')">
      ${ICONS[n.icon]} ${n.label}
    </button>
  `).join('');
}

function setView(v) {
  state.view = v;
  render();
}

// ============================================================
// RENDER MAIN
// ============================================================
function render() {
  renderNav();
  const main = document.getElementById('main');
  switch (state.view) {
    case 'dashboard':   main.innerHTML = renderDashboard();   renderDashboardCharts(); break;
    case 'prospection': main.innerHTML = renderProspection(); break;
    case 'clients':     main.innerHTML = renderClients();     break;
    case 'contracts':   main.innerHTML = renderContracts();   break;
    case 'accounting':  main.innerHTML = renderAccounting();  renderAccountingCharts(); break;
    case 'projects':    main.innerHTML = renderProjects();    break;
  }
}

// ============================================================
// DASHBOARD
// ============================================================
function computeStats() {
  const { contracts, expenses } = state;
  const paid = contracts.filter(c => c.invoiceStatus === 'paid').reduce((s,c)=>s+Number(c.amount||0),0);
  const unpaid = contracts.filter(c => c.invoiceStatus === 'sent').reduce((s,c)=>s+Number(c.amount||0),0);
  const quoted = contracts.filter(c => ['quote_sent','quote_signed'].includes(c.status)).reduce((s,c)=>s+Number(c.amount||0),0);
  const totalExpenses = expenses.reduce((s,e)=>s+Number(e.amount||0),0);

  const byService = SERVICES.map(s => ({
    label: s.label,
    value: contracts.filter(c => c.service === s.id && c.invoiceStatus === 'paid').reduce((sum,c)=>sum+Number(c.amount||0),0),
    color: s.color,
  })).filter(x => x.value > 0);

  const now = new Date();
  const monthly = Array.from({length: 6}, (_, i) => {
    const d = new Date(now.getFullYear(), now.getMonth() - (5 - i), 1);
    const monthKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const revenue = contracts
      .filter(c => c.invoiceStatus === 'paid' && c.paidDate && c.paidDate.startsWith(monthKey))
      .reduce((s,c)=>s+Number(c.amount||0),0);
    return { month: d.toLocaleDateString('fr-FR',{month:'short'}), CA: revenue };
  });

  return { paid, unpaid, quoted, totalExpenses, byService, monthly };
}

function renderDashboard() {
  const s = computeStats();
  const inProgress = state.projects.filter(p => p.status === 'in_progress').length;
  const notStarted = state.projects.filter(p => p.status === 'not_started').length;

  return `
    <div class="view">
      <div class="view-header">
        <div>
          <h2 class="view-title">Tableau de bord</h2>
          <p class="view-subtitle">Vue d'ensemble de ton activité</p>
        </div>
      </div>

      <div class="kpi-grid">
        <div class="card kpi kpi-coral">
          <div class="kpi-icon">${ICONS.euro}</div>
          <div class="kpi-label">CA encaissé</div>
          <div class="kpi-value">${fmtEur(s.paid)}</div>
        </div>
        <div class="card kpi kpi-warning">
          <div class="kpi-icon">${ICONS.alert}</div>
          <div class="kpi-label">Impayés</div>
          <div class="kpi-value">${fmtEur(s.unpaid)}</div>
        </div>
        <div class="card kpi kpi-blue">
          <div class="kpi-icon">${ICONS.send}</div>
          <div class="kpi-label">Devis en cours</div>
          <div class="kpi-value">${fmtEur(s.quoted)}</div>
        </div>
        <div class="card kpi kpi-dark">
          <div class="kpi-icon">${ICONS.trending}</div>
          <div class="kpi-label">Bénéfice net</div>
          <div class="kpi-value">${fmtEur(s.paid - s.totalExpenses)}</div>
        </div>
      </div>

      <div class="grid-2">
        <div class="card">
          <h3 class="card-title">CA des 6 derniers mois</h3>
          <div class="chart-wrap"><canvas id="chartMonthly"></canvas></div>
        </div>
        <div class="card">
          <h3 class="card-title">CA par prestation</h3>
          ${s.byService.length === 0
            ? '<div class="empty">Pas encore de CA encaissé</div>'
            : '<div class="chart-wrap"><canvas id="chartPie"></canvas></div>'}
        </div>
      </div>

      <div class="grid-3">

const PROSPECT_STATUS = {
  to_contact:   { label: 'À contacter',      color: '#9ca3af', order: 1 },
  contacted:    { label: 'Contacté',         color: '#6296f7', order: 2 },
  in_discussion:{ label: 'En discussion',    color: '#afc1ed', order: 3 },
  quote_sent:   { label: 'Devis envoyé',     color: '#f59e0b', order: 4 },
  won:          { label: 'Gagné 🎉',         color: '#10b981', order: 5 },
  lost:         { label: 'Perdu',            color: '#ef4444', order: 6 },
  on_hold:      { label: 'En pause',         color: '#6b7280', order: 7 },
};

const PROSPECT_SOURCES = [
  'Bouche-à-oreille', 'LinkedIn', 'Instagram', 'Site web',
  'Salon/Événement', 'Ancien client', 'Réseau perso', 'Prospection directe',
  'Recommandation', 'Autre'
];

const PROSPECT_PRIORITIES = {
  high:   { label: '🔥 Haute',  color: '#ef4444' },
  medium: { label: '⚡ Moyenne', color: '#f59e0b' },
  low:    { label: '🌱 Basse',   color: '#9ca3af' },
};

function daysDiff(dateStr) {
  if (!dateStr) return null;
  const today = new Date();
  today.setHours(0,0,0,0);
  const d = new Date(dateStr);
  d.setHours(0,0,0,0);
  return Math.floor((d - today) / (1000 * 60 * 60 * 24));
}

function formatDateWithWarning(dateStr, isAction = true) {
  if (!dateStr) return '<span class="prospect-date-ok">—</span>';
  const diff = daysDiff(dateStr);
  const formatted = fmtDate(dateStr);
  if (isAction) {
    if (diff < 0) return `<span class="prospect-date-danger">${formatted} (en retard)</span>`;
    if (diff === 0) return `<span class="prospect-date-warning">${formatted} (aujourd'hui)</span>`;
    if (diff <= 3) return `<span class="prospect-date-warning">${formatted} (dans ${diff}j)</span>`;
    return `<span class="prospect-date-ok">${formatted}</span>`;
  } else {
    if (diff !== null && diff > -7) return `<span class="prospect-date-ok">${formatted}</span>`;
    return `<span class="prospect-date-warning">${formatted}</span>`;
  }
}

function setProspectFilter(f) {
  state.prospectFilter = f;
  render();
}

function setProspectSort(key) {
  if (state.prospectSort.key === key) {
    state.prospectSort.dir = state.prospectSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    state.prospectSort.key = key;
    state.prospectSort.dir = 'asc';
  }
  render();
}

function renderProspection() {
  const all = state.prospects;
  const filter = state.prospectFilter;
  const sort = state.prospectSort;

  // Filtrer
  let list = filter === 'all' ? [...all] : all.filter(p => p.status === filter);

  // Trier
  list.sort((a, b) => {
    let va, vb;
    switch (sort.key) {
      case 'company':    va = (a.company||'').toLowerCase(); vb = (b.company||'').toLowerCase(); break;
      case 'status':     va = PROSPECT_STATUS[a.status]?.order || 99; vb = PROSPECT_STATUS[b.status]?.order || 99; break;
      case 'priority':   va = ({high:1,medium:2,low:3})[a.priority]||99; vb = ({high:1,medium:2,low:3})[b.priority]||99; break;
      case 'budget':     va = Number(a.budget)||0; vb = Number(b.budget)||0; break;
      case 'lastContact':va = a.lastContactDate||''; vb = b.lastContactDate||''; break;
      case 'nextAction': va = a.nextActionDate||'9999'; vb = b.nextActionDate||'9999'; break;
      default: va = ''; vb = '';
    }
    if (va < vb) return sort.dir === 'asc' ? -1 : 1;
    if (va > vb) return sort.dir === 'asc' ? 1 : -1;
    return 0;
  });

  // KPIs
  const kpis = Object.entries(PROSPECT_STATUS).map(([k, s]) => {
    const items = all.filter(p => p.status === k);
    return {
      key: k,
      label: s.label,
      color: s.color,
      count: items.length,
      amount: items.reduce((sum, p) => sum + Number(p.budget || 0), 0),
    };
  });

  // Alertes : actions en retard ou aujourd'hui
  const overdue = all.filter(p => {
    if (!p.nextActionDate || ['won','lost','on_hold'].includes(p.status)) return false;
    const d = daysDiff(p.nextActionDate);
    return d !== null && d <= 0;
  });

  const totalPipeline = all
    .filter(p => !['won','lost'].includes(p.status))
    .reduce((s,p) => s + Number(p.budget||0), 0);

  const totalWon = all
    .filter(p => p.status === 'won')
    .reduce((s,p) => s + Number(p.budget||0), 0);

  return `

        <div>

          <p class="view-subtitle">${all.length} prospect${all.length>1?'s':''} • Pipeline : ${fmtEur(totalPipeline)} • Gagné : ${fmtEur(totalWon)}</p>

        </div>
      </div>

      ${overdue.length > 0 ? `
        <div class="prospect-alert">
          ${ICONS.alert}
          <div>
            <strong>${overdue.length} action${overdue.length>1?'s':''} à faire aujourd'hui ou en retard :</strong>
            ${overdue.slice(0, 3).map(p => escapeHtml(p.company)).join(', ')}${overdue.length > 3 ? `, +${overdue.length - 3} autres` : ''}
          </div>
        </div>
      ` : ''}

      <!-- KPIs pipeline -->
      <div class="prospect-kpis">
        ${kpis.map(k => `
          <div class="card prospect-kpi" style="border-left-color:${k.color};cursor:pointer" onclick="setProspectFilter('${k.key}')">

      </div>

      <!-- Filtres -->
      <div class="filters">
        <button class="chip ${filter==='all'?'active':''}" onclick="setProspectFilter('all')">Tous (${all.length})</button>
        ${Object.entries(PROSPECT_STATUS).map(([k,s]) => `
          <button class="chip ${filter===k?'active':''}"
            ${filter===k ? `style="background:${s.color};color:white;border-color:${s.color}"` : ''}
            onclick="setProspectFilter('${k}')">${s.label}</button>
        `).join('')}
      </div>

      <!-- Tableau -->
      ${list.length === 0 ? `
        <div class="card empty-state">

                  <th class="${sort.key==='company'?'sort-active':''}" onclick="setProspectSort('company')">Entreprise ${sort.key==='company'?(sort.dir==='asc'?'↑':'↓'):''}</th>

                  <th class="${sort.key==='priority'?'sort-active':''}" onclick="setProspectSort('priority')">Priorité ${sort.key==='priority'?(sort.dir==='asc'?'↑':'↓'):''}</th>
                  <th>Prestation</th>

                  <th></th>

                      </td>

                      <td style="font-size:11px;color:var(--muted)">${p.source ? escapeHtml(p.source) : '—'}</td>

                      <td>${['won','lost','on_hold'].includes(p.status) ? '<span class="prospect-date-ok">—</span>' : formatDateWithWarning(p.nextActionDate, true)}</td>

                        <div style="background:#f9fafb;padding:8px 12px;border-radius:6px;font-size:12px;color:var(--muted);font-style:italic">

            </table>
          </div>
        </div>
      `}
    </div>
  `;

function deleteProspect(id) {
  if (!confirm('Supprimer ce prospect ?')) return;
  state.prospects = state.prospects.filter(x => x.id !== id);
  saveAll(); render();
}

function convertProspectToClient(id) {
  const p = state.prospects.find(x => x.id === id);
  if (!p) return;
  if (!confirm(`Convertir "${p.company}" en client ?\n\nLe prospect sera marqué comme "Gagné" et un nouveau client sera créé.`)) return;

  // Créer client
  state.clients.push({
    id: uid(),
    name: p.contactName || p.company,
    company: p.company,
    email: p.email,
    phone: p.phone,
    location: '',
  });

  // Marquer prospect comme gagné
  state.prospects = state.prospects.map(x => x.id === id ? { ...x, status: 'won' } : x);

  saveAll();
  alert('✅ Client créé ! Tu peux maintenant créer un contrat pour lui.');
  render();
}

function exportProspectsCSV() {
  const rows = [['Entreprise','Secteur','Contact','Fonction','Email','Téléphone','Site','LinkedIn','Statut','Priorité','Prestation','Budget','Source','Dernier contact','Prochaine action','Action','Notes']];
  state.prospects.forEach(p => {
    const st = PROSPECT_STATUS[p.status]?.label || p.status;
    const prio = PROSPECT_PRIORITIES[p.priority]?.label || p.priority;
    const srv = SERVICES.find(x => x.id === p.service)?.label || '';
    rows.push([
      p.company, p.sector, p.contactName, p.contactRole,
      p.email, p.phone, p.website, p.linkedin,
      st, prio, srv,
      p.budget ? Number(p.budget).toFixed(2).replace('.', ',') : '',
      p.source,
      p.lastContactDate, p.nextActionDate, p.nextActionLabel,
      p.notes,
    ]);
  });
  const csv = '\uFEFF' + rows.map(r =>
    r.map(c => `"${String(c ?? '').replace(/"/g, '""')}"`).join(';')
  ).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `prospection-${todayISO()}-design-by-cloe.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function getMonthlyData(ym) {
  // Entrées : factures payées ce mois-là
  const income = state.contracts
    .filter(c => c.invoiceStatus === 'paid' && c.paidDate && c.paidDate.startsWith(ym))
    .map(c => {
      const client = state.clients.find(x => x.id === c.clientId);
      const srv = SERVICES.find(x => x.id === c.service);
      return {
        type: 'in',
        date: c.paidDate,
        label: c.title,
        client: client?.name || '—',
        category: srv?.label || 'Autre',
        categoryColor: srv?.color || '#9ca3af',
        amount: Number(c.amount || 0),
      };
    });

  // Sorties : charges de ce mois
  const outcome = state.expenses
    .filter(e => e.date && e.date.startsWith(ym))
    .map(e => ({
      type: 'out',
      date: e.date,
      label: e.label,
      client: '',
      category: e.category || 'Autre',
      categoryColor: '#6296f7',
      amount: Number(e.amount || 0),
    }));

  const totalIn = income.reduce((s,x)=>s+x.amount, 0);
  const totalOut = outcome.reduce((s,x)=>s+x.amount, 0);

  return {
    income,
    outcome,
    totalIn,
    totalOut,
    net: totalIn - totalOut,
    all: [...income, ...outcome].sort((a,b) => a.date.localeCompare(b.date)),
  };
}

function setAccountingTab(tab) {
  state.accountingTab = tab;
  render();
}

function changeMonth(delta) {
  state.currentMonth = delta > 0 ? nextMonth(state.currentMonth) : prevMonth(state.currentMonth);
  render();
}

function renderAccounting() {
  const tab = state.accountingTab;
  const ym = state.currentMonth;
  const data = getMonthlyData(ym);
  const prevYm = prevMonth(ym);
  const prevData = getMonthlyData(prevYm);
  const isCurrentMonth = ym === new Date().toISOString().slice(0, 7);

  // Variation vs mois précédent
  const inDelta = prevData.totalIn > 0 ? ((data.totalIn - prevData.totalIn) / prevData.totalIn) * 100 : null;
  const outDelta = prevData.totalOut > 0 ? ((data.totalOut - prevData.totalOut) / prevData.totalOut) * 100 : null;

  return `
    <div class="view">
      <div class="view-header">
        <div>
          <h2 class="view-title">Comptabilité</h2>
          <p class="view-subtitle">Suivi détaillé de tes entrées et sorties</p>
        </div>

          <button class="btn btn-secondary" onclick="exportMonthCSV()">${ICONS.download} Exporter le mois (CSV)</button>

      </div>

      <div class="sub-tabs">
        <button class="sub-tab ${tab==='monthly'?'active':''}" onclick="setAccountingTab('monthly')">📅 Vue mensuelle</button>
        <button class="sub-tab ${tab==='global'?'active':''}" onclick="setAccountingTab('global')">📊 Vue globale</button>
      </div>

      ${tab === 'monthly' ? renderMonthlyView(data, ym, isCurrentMonth, inDelta, outDelta) : renderGlobalView()}
    </div>
  `;
}

function renderAccountingCharts() {
  if (state.accountingTab === 'monthly') {
    // Graphique comparatif 6 mois (entrées vs sorties)
    const ctx = document.getElementById('chartCompare');
    if (!ctx) return;
    if (chartMonthlyCompare) chartMonthlyCompare.destroy();

    const now = new Date();
    const months = Array.from({length: 6}, (_, i) => {
      const d = new Date(now.getFullYear(), now.getMonth() - (5 - i), 1);
      const ym = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      const md = getMonthlyData(ym);
      return {
        label: d.toLocaleDateString('fr-FR',{month:'short', year:'2-digit'}),
        income: md.totalIn,
        outcome: md.totalOut,
      };
    });

    chartMonthlyCompare = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: months.map(x => x.label),
        datasets: [
          {
            label: 'Entrées',
            data: months.map(x => x.income),
            backgroundColor: '#10b981',
            borderRadius: 6,
          },
          {
            label: 'Sorties',
            data: months.map(x => x.outcome),
            backgroundColor: '#ef4444',
            borderRadius: 6,
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'top', labels: { font: { size: 12 }, usePointStyle: true } },
          tooltip: { callbacks: { label: (c) => `${c.dataset.label}: ${fmtEur(c.parsed.y)}` } }
        },
        scales: {
          y: { ticks: { callback: v => fmtEur(v) }, grid: { color: '#f3f4f6' } },
          x: { grid: { display: false } }
        }
      }
    });
  } else {
    // Vue globale : graphique par service
    const ctx = document.getElementById('chartBar');
    if (!ctx) return;
    if (chartBar) chartBar.destroy();

    const data = SERVICES.map(s => ({
      label: s.label,
      value: state.contracts.filter(c => c.service === s.id && c.invoiceStatus === 'paid')
        .reduce((sum,c)=>sum+Number(c.amount||0),0),
      color: s.color,
    }));

    chartBar = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: data.map(x => x.label),
        datasets: [{
          data: data.map(x => x.value),
          backgroundColor: data.map(x => x.color),
          borderRadius: 8,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: (c) => fmtEur(c.parsed.y) } }
        },
        scales: {
          y: { ticks: { callback: v => fmtEur(v) }, grid: { color: '#f3f4f6' } },
          x: { grid: { display: false } }
        }
      }
    });
  }
}

function exportMonthCSV() {
  const ym = state.currentMonth;
  const data = getMonthlyData(ym);
  const rows = [
    ['Date', 'Type', 'Libellé', 'Client', 'Catégorie', 'Montant (€)']
  ];
  data.all.forEach(m => {
    rows.push([
      m.date,
      m.type === 'in' ? 'Entrée' : 'Sortie',
      m.label,
      m.client,
      m.category,
      (m.type === 'in' ? m.amount : -m.amount).toFixed(2).replace('.', ','),
    ]);
  });
  rows.push([]);
  rows.push(['TOTAL ENTRÉES', '', '', '', '', data.totalIn.toFixed(2).replace('.', ',')]);
  rows.push(['TOTAL SORTIES', '', '', '', '', (-data.totalOut).toFixed(2).replace('.', ',')]);
  rows.push(['SOLDE NET', '', '', '', '', data.net.toFixed(2).replace('.', ',')]);

  const csv = '\uFEFF' + rows.map(r =>
    r.map(c => `"${String(c ?? '').replace(/"/g, '""')}"`).join(';')
  ).join('\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `compta-${ym}-design-by-cloe.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

    <div class="grid-2-form">
      ${field('Montant (€)', `<input class="field-input" type="number" step="0.01" id="f_amount" value="${escapeHtml(e.amount)}">`)}
      ${field('Catégorie', select('f_category', cats.map(c=>({value:c,label:c})), e.category))}

      <button class="btn btn-primary" onclick="submitModal()">${id?'Enregistrer':'Ajouter'}</button>

  `, () => {

function deleteExpense(id) {
  if (!confirm('Supprimer cette charge ?')) return;
  state.expenses = state.expenses.filter(x => x.id !== id);

}

function renderProjects() {
  const clientName = id => state.clients.find(c => c.id === id)?.name || '—';

  return `
    <div class="view">
      <div class="view-header">
        <div>
          <h2 class="view-title">Projets</h2>
          <p class="view-subtitle">${state.projects.length} projet${state.projects.length>1?'s':''}</p>
        </div>
        <button class="btn btn-primary" onclick="openProjectModal()">${ICONS.plus} Nouveau projet</button>
      </div>

      <div class="kanban">
        ${Object.entries(PROJECT_STATUS).map(([key, s]) => {
          const items = state.projects.filter(p => p.status === key);
          return `
            <div class="kanban-col">
              <div class="kanban-header" style="border-top-color:${s.color}">
                <div style="color:${s.color}">${ICONS[s.icon]} <strong style="color:var(--text)">${s.label}</strong></div>
                <span class="kanban-count">${items.length}</span>
              </div>
              <div class="kanban-items">
                ${items.map(p => {
                  const srv = SERVICES.find(x => x.id === p.service);
                  return `
                    <div class="card project-card">
                      <div class="project-header">
                        <h4>${escapeHtml(p.title)}</h4>
                        <div class="card-actions">
                          <button class="icon-btn" onclick="openProjectModal('${p.id}')">${ICONS.edit}</button>
                          <button class="icon-btn icon-btn-danger" onclick="deleteProject('${p.id}')">${ICONS.trash}</button>
                        </div>
                      </div>
                      <p class="project-client">${escapeHtml(clientName(p.clientId))}</p>
                      ${srv ? badge(srv.label, srv.color) : ''}
                      ${p.deadline ? `
                        <div class="project-deadline">${ICONS.calendar} ${fmtDate(p.deadline)}</div>
                      ` : ''}
                      ${key === 'in_progress' ? `
                        <div class="progress-wrap">
                          <div class="progress-bar">
                            <div class="progress-fill" style="width:${p.progress || 0}%"></div>
                          </div>
                          <span>${p.progress || 0}%</span>
                        </div>
                      ` : ''}
                    </div>
                  `;
                }).join('')}
                ${items.length === 0 ? '<div class="kanban-empty">Rien ici</div>' : ''}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function openProjectModal(id) {
  const p = id ? state.projects.find(x => x.id === id) : {

    status:'not_started', startDate: todayISO(), deadline:'',
    progress: 0, notes:'',
  };
  const clientOpts = [{id:'', name:'— Aucun —'}, ...state.clients];

  openModal(id ? 'Modifier projet' : 'Nouveau projet', `
    ${field('Titre *', `<input class="field-input" id="f_title" value="${escapeHtml(p.title)}">`)}

    <div class="grid-2-form">

    <div class="grid-2-form">
      ${field('Date de début', `<input class="field-input" type="date" id="f_startDate" value="${p.startDate||''}">`)}
      ${field('Deadline', `<input class="field-input" type="date" id="f_deadline" value="${p.deadline||''}">`)}

    if (!data.title) return;

    else state.projects.push({ ...data, id: uid() });
    saveAll(); closeModal(); render();
  });

function deleteProject(id) {
  if (!confirm('Supprimer ce projet ?')) return;
  state.projects = state.projects.filter(x => x.id !== id);
  saveAll(); render();
}

// ============================================================
// HELPERS HTML
// ============================================================
function field(label, input) {
  return `<label class="field"><span class="field-label">${label}</span>${input}</label>`;
}
function select(id, options, value) {
  return `<select class="field-input" id="${id}">${options.map(o =>
    `<option value="${escapeHtml(o.value)}" ${o.value===value?'selected':''}>${escapeHtml(o.label)}</option>`
  ).join('')}</select>`;
}
function badge(label, color) {
  return `<span class="badge" style="background:${color}22;color:${color};border:1px solid ${color}44">${escapeHtml(label)}</span>`;
}
